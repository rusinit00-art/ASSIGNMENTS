<body>
    <style>
        section {
            width: 1000px;
            height: 600px;
            border: 3px solid black;
            position: relative;

        }

        div {
            width: 100px;
            height: 50px;
            border-radius: 30% ;
            background-color: deepskyblue;
            position: absolute;

            animation-name: move;
            animation-duration: 2000ms;
            animation-iteration-count: infinite;
            animation-timing-function: linear;
        }

        @keyframes move {
            0% {
                left: 0;
                top: 0;
                transform: rotate(180deg);
            }
            25% {

                left:900px;
                top: 0;
                transform: rotate(360deg);
            }
            50% {

                left:900px;
                top: 550px;
            }
            75% {
                left: 0;
                top:550px;
            }
            100% {
                left: 0;
                top: 0;

            }
        }

    </style>
</body>
<body>

<section>
    <div></div>
</section>

</body>
